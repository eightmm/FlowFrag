model:
  hidden_dim: 256
  num_encoder_layers_prot: 3
  num_encoder_layers_lig: 4
  num_docking_layers: 4
  hidden_scalar_dim: 128
  hidden_vec_dim: 32
  omega_mode: neural_1e

data:
  data_dir: data/processed
  min_atoms: 5
  max_atoms: 80
  max_frags: 20
  prior_sigma: 1.0
  rotation_augmentation: ligand_uniform
  deterministic: false
  deterministic_augmentation: true
  deterministic_prior: true
  deterministic_time: true
  prior_bank_size: 2
  time_bank_size: 4
  num_workers: 0
  val_split: 0.0

training:
  epochs: 1500
  batch_size: 4
  gradient_accumulation_steps: 1
  use_muon: false
  lr: 1.0e-4
  weight_decay: 0.0
  omega_weight: 1.0
  max_grad_norm: 0.5
  scheduler_type: trapezoidal
  warmup_ratio: 0.1
  cooldown_ratio: 0.3
  seed: 42
  overfit_batches: 32

logging:
  use_wandb: true
  wandb_project: flowfrag
  wandb_run_name: overfit-neural1e-q1neqI-priorbank-large-stable-wandb
  log_every: 20
  val_every: 0
  save_every: 0
  output_dir: outputs/overfit_neural1e_q1neqI_priorbank_large_stable_wandb
