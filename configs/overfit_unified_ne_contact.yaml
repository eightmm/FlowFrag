model:
  model_type: unified
  hidden_dim: 256
  hidden_vec_dim: 32
  l2_dim: 16
  l2o_dim: 16
  num_layers: 4
  n_rbf: 16
  t_emb_dim: 128
  sh_lmax: 2
  dropout: 0.0
  omega_mode: newton_euler
  contact_cutoff: 4.0

data:
  data_dir: data/processed_v2
  min_atoms: 5
  max_atoms: 80
  max_frags: 20
  prior_sigma: 1.0
  rotation_augmentation: ligand_uniform
  deterministic: false
  deterministic_augmentation: true
  deterministic_prior: false
  deterministic_time: false
  num_workers: 0
  val_split: 0.0

training:
  epochs: 2000
  batch_size: 4
  gradient_accumulation_steps: 4
  use_muon: false
  lr: 1.0e-4
  weight_decay: 0.0
  omega_weight: 1.0
  max_grad_norm: 0.5
  scheduler_type: trapezoidal
  warmup_ratio: 0.1
  cooldown_ratio: 0.3
  seed: 42
  overfit_batches: 4

logging:
  use_wandb: true
  wandb_project: flowfrag
  wandb_run_name: overfit-unified-ne-2e2o-contact4A
  log_every: 4
  val_every: 0
  output_dir: outputs/overfit_unified_ne_contact
