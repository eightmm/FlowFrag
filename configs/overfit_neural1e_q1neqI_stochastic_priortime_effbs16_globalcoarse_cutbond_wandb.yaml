model:
  hidden_dim: 256
  num_encoder_layers_prot: 3
  num_encoder_layers_lig: 4
  num_docking_layers: 4
  hidden_scalar_dim: 128
  hidden_vec_dim: 32
  pf_topology: full
  ff_topology: full
  use_cut_bond_edges: true
  omega_mode: neural_1e

data:
  data_dir: data/processed
  min_atoms: 5
  max_atoms: 80
  max_frags: 20
  prior_sigma: 1.0
  rotation_augmentation: ligand_uniform
  deterministic: false
  deterministic_augmentation: true
  deterministic_prior: false
  deterministic_time: false
  num_workers: 0
  val_split: 0.0

training:
  epochs: 6000
  batch_size: 4
  gradient_accumulation_steps: 4
  use_muon: false
  lr: 1.0e-4
  weight_decay: 0.0
  omega_weight: 1.0
  max_grad_norm: 0.5
  scheduler_type: trapezoidal
  warmup_ratio: 0.1
  cooldown_ratio: 0.3
  seed: 42
  overfit_batches: 4

logging:
  use_wandb: true
  wandb_project: flowfrag
  wandb_run_name: overfit-neural1e-q1neqI-stochastic-priortime-effbs16-globalcoarse-cutbond-wandb
  log_every: 4
  val_every: 0
  save_every: 0
  output_dir: outputs/overfit_neural1e_q1neqI_stochastic_priortime_effbs16_globalcoarse_cutbond_wandb
