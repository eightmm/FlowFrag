model:
  model_type: unified
  hidden_dim: 512
  hidden_vec_dim: 64
  l2_dim: 32
  l2o_dim: 32
  num_layers: 6
  n_rbf: 32
  t_emb_dim: 128
  sh_lmax: 2
  dropout: 0.1
  contact_cutoff: 5.0

data:
  data_dir: data/plinder_processed
  split_file: data/splits/plinder_v4.json

  # Pocket / size filters
  min_atoms: 5
  max_atoms: 120                  # was 80; expanded for cofactors / large ligands
  max_frags: 30                   # was 20; expanded for cofactors
  min_protein_res: 50

  # Single-value fallbacks (used by val + when range is null at train time)
  pocket_cutoff: 8.0
  pocket_jitter_sigma: 2.0        # N(0, σ²·I) Å on pocket center
  pocket_cutoff_noise: 0.0        # ignored when pocket_cutoff_range is set
  prior_sigma: 3.0

  # Range-based per-sample sampling at training (val turns these off):
  #
  # pocket_cutoff_range — Uniform[6, 12] Å. Covers tight inhibitors (6 Å) →
  # cofactor sites needing 10-12 Å of context. 5 Å leaves ~6 residues which
  # is too thin for fragment hopping; 13+ Å risks OOM on B200 batch=64.
  pocket_cutoff_range: [6.0, 12.0]

  # prior_sigma_range — Log-Uniform[2, 6] Å. Geometric mean √12 ≈ 3.46 Å
  # matches the empirical T_1 axis std (3.4 Å, our deploy default σ=3) so
  # most training mass sits near deploy distribution while still exposing
  # blind-docking-like (σ=5-6) and tight (σ=2) regimes for robustness.
  prior_sigma_range: [2.0, 6.0]
  prior_sigma_log_uniform: true

  # Time-sampling distribution. v4 default = "simplefold":
  #   p(t) = 0.02 * U(0, 1) + 0.98 * LN(m=0.8, s=1.7)
  # Shifted logit-normal peaked near t≈0.69 (late refinement focus) with a
  # 2 % uniform floor so both endpoints stay non-zero. Matches SimpleFold /
  # AF3-style structure models and aligns naturally with our late-biased
  # ODE inference schedule (rollout_time_schedule: late, power=3).
  # Other options:
  #   uniform      — Lipman 2023 baseline, flat density
  #   logit_normal — SD3 / v3 default (peaked at t≈0.5)
  #   mixture      — 70 % LN(0,1) + 10 % U[0.02,0.20] + 20 % U[0.75,0.98]
  time_distribution: simplefold

  rotation_augmentation: ligand_uniform
  deterministic: false
  num_workers: 8

  # Receptor augmentation: 30% chance to swap holo with apo / AF2-pred
  # receptor (28k of 130k systems have HQ alt structures).
  receptor_aug_prob: 0.3
  alt_receptor_root: data/plinder_processed/_alt_proteins
  alt_receptor_mapping: data/plinder_processed/alt_receptor_mapping.json

training:
  max_steps: 100000              # 8x training data → 4x steps for convergence parity
  batch_size: 64                 # per-GPU → effective 512 on 8 B200
  gradient_accumulation_steps: 1
  use_muon: true
  muon_lr: 0.02
  lr: 3.0e-4
  weight_decay: 0.01
  omega_weight: 8.0
  atom_aux_weight: 0.3
  dg_weight: 3.0
  max_grad_norm: 1.0
  scheduler_type: trapezoidal
  warmup_ratio: 0.02             # 2k step warmup
  cooldown_ratio: 0.3            # 30k step cooldown
  seed: 42
  use_ema: true
  ema_decay: 0.999
  use_time_weighting: false

logging:
  use_wandb: true
  wandb_project: flowfrag
  wandb_run_name: v4-plinder-b200x8
  log_every: 25
  val_every: 500
  rollout_every: 5000
  rollout_steps: 25
  rollout_time_schedule: late
  rollout_schedule_power: 3.0
  rollout_max_samples: 0          # full PLINDER-val (598)
  output_dir: outputs/v4_plinder
