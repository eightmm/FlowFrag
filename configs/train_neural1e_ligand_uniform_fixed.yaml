model:
  hidden_dim: 256
  num_encoder_layers_prot: 3
  num_encoder_layers_lig: 4
  num_docking_layers: 3
  hidden_scalar_dim: 128
  hidden_vec_dim: 32
  omega_mode: neural_1e

data:
  data_dir: data/processed
  min_atoms: 5
  max_atoms: 80
  max_frags: 20
  prior_sigma: 1.0
  rotation_augmentation: ligand_uniform
  deterministic: true
  num_workers: 4
  split_file: configs/split.json

training:
  epochs: 1000
  batch_size: 8
  gradient_accumulation_steps: 4
  use_muon: true
  lr: 1.0e-4
  muon_lr: 0.005
  weight_decay: 0.01
  omega_weight: 1.0
  max_grad_norm: 1.0
  scheduler_type: trapezoidal
  warmup_ratio: 0.1
  cooldown_ratio: 0.3
  seed: 42

logging:
  use_wandb: true
  wandb_project: flowfrag
  wandb_run_name: neural1e-ligand-uniform-fixed
  log_every: 50
  val_every: 2500
  rollout_every: 10000
  rollout_steps: 20
  output_dir: outputs/neural1e_ligand_uniform_fixed
